# ============================================================================
# GENERAL
# ============================================================================

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ga update-environment " COLORTERM"
set -g mouse on
set -g history-limit 100000
set -g set-clipboard on
set -s escape-time 0
set-option -g default-shell /bin/zsh
set-option -g focus-events on

# Refresh status bar on pane/window/session switch
set-hook -g pane-focus-in 'refresh-client -S'

# ============================================================================
# STATUS BAR
# ============================================================================

set -g status on
set -g status-interval 5
set -g status-position bottom

# Gruvbox colors
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g message-style "fg=#fe8019,bg=#3c3836,bold"
set -g mode-style "fg=#282828,bg=#fabd2f"

# Pane borders
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#d79921"

# Left: hostname
set -g status-left-length 30
set -g status-left " #[fg=#d79921,bold]#h "

# Center: all sessions (current highlighted)
set -g status-justify centre
set -g window-status-format ""
set -g window-status-current-format "#($HOME/scripts/tmux_sessions.sh '#{session_name}')"

# Right: pwd | firewall | time
# Firewall status stored in @fw_status, updated by net script, set at startup
run-shell '$HOME/scripts/tmux_fw_status.sh'
set -g status-right-length 120
set -g status-right "#[fg=#ebdbb2]#{pane_current_path} #[fg=#504945]│ #{?#{==:#{@fw_status},1},#[fg=#fb4934]󰀂,#{?#{==:#{@fw_status},0},#[fg=#00d75f]󰒄,#[fg=#fe8019]󰛵}} #{?#{==:#{@fw_docker_status},1},#[fg=#fb4934]󰀂,#{?#{==:#{@fw_docker_status},0},#[fg=#00d75f]󰒄,#[fg=#fe8019]󰛵}} #[fg=#504945]│ #[fg=#ebdbb2]%H:%M "

# ============================================================================
# KEY BINDINGS - SPLITS & WINDOWS
# ============================================================================

bind -n \uE001 split-window -h -c "#{pane_current_path}"  # Ctrl+Shift+Enter
bind -n \uE002 split-window -v -c "#{pane_current_path}"  # Ctrl+Shift+H

unbind c
bind c new-window -c "#{pane_current_path}"

# New session with name prompt (Ctrl+Shift+S)
bind -n \uE030 command-prompt -p "New session:" "new-session -s '%%'"

# Rename current session
bind r command-prompt -p "Rename session:" "rename-session '%%'"

# ============================================================================
# KEY BINDINGS - PANE RESIZE & NAVIGATION
# ============================================================================

# Resize (Ctrl+Shift+Arrows)
bind -n \uE010 resize-pane -L 1  # Ctrl+Shift+Left
bind -n \uE011 resize-pane -R 1  # Ctrl+Shift+Right
bind -n \uE012 resize-pane -U 1  # Ctrl+Shift+Up
bind -n \uE013 resize-pane -D 1  # Ctrl+Shift+Down

# Navigate (Alt+Arrows)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch sessions (Alt+Shift+Arrows)
bind -n \uE040 switch-client -p  # Alt+Shift+Left  (n -> 0)
bind -n \uE041 switch-client -n  # Alt+Shift+Right (0 -> n)

# Rotate panes (Super+Shift+R)
bind -n \uE020 rotate-window -D

# ============================================================================
# KEY BINDINGS - VI COPY MODE
# ============================================================================

set-window-option -g mode-keys vi
bind -n M-v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if [ -n \"$WAYLAND_DISPLAY\" ]; then wl-copy; else xclip -selection clipboard -i; fi'"
