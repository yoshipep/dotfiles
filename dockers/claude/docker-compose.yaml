services:
  claude-code:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${UID:-1000}
    container_name: claude-code
    # Default bridge (no embedded DNS at 127.0.0.11) + explicit DNS routes through FORWARD chain
    # This allows net don/doff to control container internet access
    network_mode: bridge
    dns:
      - ${DNS_SERVER}
    volumes:
      - ~/repos:/home/claude/repos
      - claude-state:/home/claude/.claude
      - ~/.claude/agents:/home/claude/.claude/agents
      - ~/.claude/statusline.sh:/home/claude/.claude/statusline.sh
      - ~/.claude/settings.json:/home/claude/.claude/settings.json
      - ./global-CLAUDE.md:/home/claude/.claude/CLAUDE.md:ro
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  claude-state:
